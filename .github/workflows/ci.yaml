# - AWS_ROLE_ARN: ARN of the IAM role for OIDC assume role
# - ORG_NAME: GitHub organization name
# - GH_TOKEN: GitHub Personal Access Token
# (OIDC_PROVIDER_ARN and AWS_REGION are created by pre_reqs)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: 1.15.6
  AWS_REGION: ap-south-1
  TF_VAR_github_org: ${{ secrets.ORG_NAME }}
  TF_VAR_github_token: ${{ secrets.GH_TOKEN }}

